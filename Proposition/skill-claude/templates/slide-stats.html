<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>CACD2 — Slide chiffres clés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    body { margin: 0; font-family: var(--font-body); background: #111; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .slide {
      width: 100%; max-width: 1920px; aspect-ratio: 16/9;
      position: relative; padding: clamp(40px, 5vw, 80px); overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.40); border-radius: 8px;
      background: var(--surface-mint); color: var(--ink-strong);
    }
    .slide__sidebar {
      position: absolute; top: clamp(40px, 5vw, 80px); left: clamp(40px, 5vw, 80px); bottom: clamp(40px, 5vw, 80px);
      display: flex; flex-direction: column; justify-content: space-between;
      font-family: var(--font-display); font-size: 0.75rem;
      letter-spacing: var(--tracking-uppercase); text-transform: uppercase;
      color: var(--ink-muted);
    }
    .slide__brand { color: var(--ink-strong); font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .slide__brand-mark {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--brand-green); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px;
    }
    .slide__sidebar-label { writing-mode: vertical-rl; transform: rotate(180deg); align-self: flex-start; }
    .slide__page { color: var(--ink-strong); font-weight: 600; font-variant-numeric: tabular-nums; }
    .slide__page span { font-weight: 400; color: var(--ink-muted); }

    .slide__content { margin-left: 80px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    .eyebrow {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
      letter-spacing: var(--tracking-uppercase); text-transform: uppercase;
      color: var(--brand-green); margin-bottom: 24px;
    }
    .title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2rem, 4.5vw, 3.75rem); line-height: 1.1;
      letter-spacing: var(--tracking-tight); color: var(--ink-strong);
      margin: 0 0 56px; max-width: 24ch;
    }
    .title em { font-family: var(--font-editorial); font-style: italic; font-weight: 400; color: var(--brand-green-deep); }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    }
    .stat {
      padding: clamp(20px, 2vw, 32px);
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
    }
    .stat__value {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1;
      letter-spacing: var(--tracking-tight); color: var(--brand-green-deep);
      margin-bottom: 12px;
    }
    .stat__value sup { font-size: 0.5em; color: var(--brand-green); vertical-align: super; }
    .stat__label {
      font-size: clamp(0.85rem, 1vw, 1rem); line-height: 1.4;
      color: var(--ink-muted); font-weight: 500;
    }
  </style>
</head>
<body>
  <article class="slide" data-template="stats">

    <aside class="slide__sidebar" aria-hidden="true">
      <div class="slide__brand">
        <span class="slide__brand-mark">C</span> CACD2
      </div>
      <div class="slide__sidebar-label">
        <!-- @cacd2:content -->Le groupe
      </div>
      <div class="slide__page">
        <!-- @cacd2:content -->02<span> / 14</span>
      </div>
    </aside>

    <div class="slide__content">
      <div class="eyebrow"><!-- @cacd2:content -->En chiffres</div>
      <h1 class="title">
        <!-- @cacd2:content -->Six ans d'expertise <em>digital</em> au service du groupe.
      </h1>

      <div class="stats-grid">
        <article class="stat">
          <div class="stat__value"><!-- @cacd2:content -->70<sup>+</sup></div>
          <div class="stat__label"><!-- @cacd2:content -->Collaborateurs Design, Produit et&nbsp;Tech</div>
        </article>
        <article class="stat">
          <div class="stat__value"><!-- @cacd2:content -->45</div>
          <div class="stat__label"><!-- @cacd2:content -->Projets réalisés depuis la création</div>
        </article>
        <article class="stat">
          <div class="stat__value"><!-- @cacd2:content -->23<sup>+</sup></div>
          <div class="stat__label"><!-- @cacd2:content -->Entités du groupe accompagnées</div>
        </article>
        <article class="stat">
          <div class="stat__value"><!-- @cacd2:content -->100<sup>%</sup></div>
          <div class="stat__label"><!-- @cacd2:content -->Filiale Crédit Agricole&nbsp;S.A.</div>
        </article>
      </div>
    </div>

  </article>
</body>
</html>
