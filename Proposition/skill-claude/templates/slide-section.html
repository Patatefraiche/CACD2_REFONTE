<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>CACD2 — Slide section editoriale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    body { margin: 0; font-family: var(--font-body); background: #111; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .slide {
      width: 100%; max-width: 1920px; aspect-ratio: 16/9;
      position: relative; padding: clamp(40px, 5vw, 80px); overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.40); border-radius: 8px;
      background: var(--surface-mint); color: var(--ink-strong);
    }
    .slide__sidebar {
      position: absolute; top: clamp(40px, 5vw, 80px); left: clamp(40px, 5vw, 80px); bottom: clamp(40px, 5vw, 80px);
      display: flex; flex-direction: column; justify-content: space-between;
      font-family: var(--font-display); font-size: 0.75rem;
      letter-spacing: var(--tracking-uppercase); text-transform: uppercase;
      color: var(--ink-muted);
    }
    .slide__brand { color: var(--ink-strong); font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .slide__brand-mark {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--brand-green); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px;
    }
    .slide__sidebar-label { writing-mode: vertical-rl; transform: rotate(180deg); align-self: flex-start; }
    .slide__page { color: var(--ink-strong); font-weight: 600; font-variant-numeric: tabular-nums; }
    .slide__page span { font-weight: 400; color: var(--ink-muted); }

    .slide__content {
      margin-left: 80px; max-width: 1100px;
      height: 100%; display: flex; flex-direction: column; justify-content: center;
    }
    .eyebrow {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
      letter-spacing: var(--tracking-uppercase); text-transform: uppercase;
      color: var(--brand-green); margin-bottom: 32px;
      display: inline-flex; align-items: center; gap: 8px; width: fit-content;
    }
    .eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--brand-green); }
    .title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2.75rem, 6vw, 5.75rem); line-height: 1.05;
      letter-spacing: var(--tracking-tight); color: var(--ink-strong);
      margin: 0 0 32px; max-width: 22ch;
    }
    .title em {
      font-family: var(--font-editorial); font-style: italic; font-weight: 400;
      color: var(--brand-green-deep);
    }
    .lead {
      font-size: clamp(1.1rem, 1.6vw, 1.5rem); line-height: 1.5;
      color: var(--ink-muted); max-width: 55ch;
    }
  </style>
</head>
<body>
  <article class="slide" data-template="section">

    <aside class="slide__sidebar" aria-hidden="true">
      <div class="slide__brand">
        <span class="slide__brand-mark">C</span> CACD2
      </div>
      <div class="slide__sidebar-label">
        <!-- @cacd2:content -->Positionnement
      </div>
      <div class="slide__page">
        <!-- @cacd2:content -->03<span> / 14</span>
      </div>
    </aside>

    <div class="slide__content">
      <div class="eyebrow">
        <!-- @cacd2:content -->Notre offre
      </div>
      <h1 class="title">
        <!-- @cacd2:content -->Fabricants et opérateurs de solutions <em>IT</em>.
      </h1>
      <p class="lead">
        <!-- @cacd2:content -->Quatre piliers complémentaires pour accompagner les entités du Crédit Agricole, du cadrage stratégique à l'exploitation en production.
      </p>
    </div>

  </article>
</body>
</html>
